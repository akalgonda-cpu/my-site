<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Catalog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f4f4f4; color: #333; }
        header { background: #fff; padding: 20px; display: flex; justify-content: space-between; border-bottom: 2px solid #eee; }
        .hero { background: #000; color: #fff; padding: 60px 20px; text-align: center; }
        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #fff; padding: 20px; border-radius: 8px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        footer { text-align: center; padding: 40px; background: #333; color: #fff; margin-top: 40px; }
    </style>
</head>
<body>

<header>
    <h2>MY CATALOG</h2>
    <nav>Home | Products | Brands | Contact</nav>
</header>

<div class="hero">
    <h1>Elegance in Every Switch</h1>
    <p>Premium electrical solutions for modern living.</p>
</div>

<div class="container">
    <div class="grid">
        <div class="card"><h3>Modular Switches</h3><p>View Collection</p></div>
        <div class="card"><h3>LED Lighting</h3><p>View Collection</p></div>
        <div class="card"><h3>Smart Cables</h3><p>View Collection</p></div>
    </div>
</div>

<footer>
    <p>&copy; 2026 My Personal Brand. All Rights Reserved.</p>
</footer>

</body>
</html>
